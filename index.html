<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WEARSHIVER — Coming Soon" />
  <title>WEARSHIVER</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Noise texture overlay -->
  <div class="noise" aria-hidden="true"></div>

  <!-- Top-left system tag -->
  <div class="system-tag">
    <span>DROP_001</span>
    <span>SHIVER SYSTEM</span>
    <span>2026</span>
  </div>

  <main class="stage">

    <!-- Bounce arena: the rectangle the logo moves inside -->
    <div class="arena" id="arena">
      <img src="assets/logo.png" alt="WEARSHIVER" class="bouncer" id="bouncer" />
    </div>

    <!-- Brand name + subtitle -->
    <h1 class="brand">WEARSHIVER</h1>
    <p class="subtitle">Coming Soon</p>
    <p class="subtext">A new drop is forming in silence.</p>

    <!-- Notify stamp -->
    <div class="stamp" id="stamp">
      <div class="stamp__row" id="stamp-form">
        <input
          type="email"
          id="email"
          class="stamp__input"
          placeholder="Enter your email"
          autocomplete="email"
          aria-label="Email address"
        />
        <button type="button" id="stamp-btn" class="stamp__btn">Notify me</button>
      </div>
      <p class="stamp__success" id="stamp-success" aria-live="polite">You're on the list.</p>
    </div>

  </main>

  <footer class="footer">© 2026 WEARSHIVER</footer>

  <script src="script.js"></script>
</body>
</html>
