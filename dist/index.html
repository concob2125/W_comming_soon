<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WEARSHIVER coming soon experience." />
  <title>WEARSHIVER</title>
  <style>
    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #050505;
      color: #f0ede8;
      font-family: "Courier New", Courier, monospace;
    }

    body {
      display: grid;
      place-items: center;
    }

    .fallback {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      align-items: center;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    a {
      color: #f0ede8;
    }
  </style>
</head>
<body>
  <div class="fallback">
    <span>WEARSHIVER</span>
    <a href="CommingSoon/">Enter system</a>
  </div>

  <script>
    (function routeExperience() {
      var nextExperience = Math.random() < 0.5 ? 'comingsoon' : 'geometrydashiver';
      var selected = nextExperience === 'geometrydashiver'
        ? 'Geometrydashiver/index.html'
        : 'CommingSoon/index.html';

      sessionStorage.setItem('wearshiver_allow_page_load', 'true');
      sessionStorage.setItem('wearshiver_current_experience', nextExperience);
      window.location.replace(selected);
    })();
  </script>
</body>
</html>
