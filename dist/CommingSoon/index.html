<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function routeOnRefresh() {
      var allowLoad = sessionStorage.getItem('wearshiver_allow_page_load') === 'true';

      if (allowLoad) {
        sessionStorage.removeItem('wearshiver_allow_page_load');
        sessionStorage.setItem('wearshiver_current_experience', 'comingsoon');
        return;
      }

      sessionStorage.setItem('wearshiver_allow_page_load', 'true');
      sessionStorage.setItem('wearshiver_current_experience', 'geometrydashiver');
      window.location.replace('/Geometrydashiver/');
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WEARSHIVER — Coming Soon" />
  <title>WEARSHIVER</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/CommingSoon/style.css" />
</head>
<body>

  <!-- Noise texture overlay -->
  <div class="noise" aria-hidden="true"></div>

  <!-- Floating DVD-style logo -->
  <div class="bouncer" id="bouncer" role="img" aria-label="WEARSHIVER logo">
    <img class="bouncer__logo" src="/CommingSoon/logo-mask-clean.png" alt="" aria-hidden="true" />
  </div>

  <!-- Top-left system tag -->
  <div class="system-tag">
    <span>DROP_001</span>
    <span>SHIVER SYSTEM ACTIVE</span>
    <span id="corner-timer">TIME: 00.00</span>
  </div>

  <main class="stage">
    <div class="hero-content">

    <!-- Brand logo + subtitle -->
    <img src="/assets/wearshiver-logo.png" alt="WEARSHIVER" class="hero-logo">
    <p class="subtitle">Coming Soon</p>
    <p class="subtext">A new drop is forming in silence.</p>

    <!-- Notify stamp -->
    <div class="stamp" id="stamp">
      <div class="stamp__row" id="stamp-form">
        <input
          type="email"
          id="email"
          class="stamp__input"
          placeholder="Enter your email"
          autocomplete="email"
          aria-label="Email address"
        />
        <button type="button" id="stamp-btn" class="stamp__btn">Notify me</button>
      </div>
      <p class="stamp__success" id="stamp-success" aria-live="polite">You're on the list.</p>
    </div>
    <p class="refresh-copy">REFRESHHH FOR MORE...</p>
    </div>

  </main>

  <a
    class="instagram-link"
    href="https://www.instagram.com/wearshiver/"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="WEARSHIVER on Instagram"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <rect x="3" y="3" width="18" height="18" rx="5" />
      <circle cx="12" cy="12" r="4" />
      <circle cx="17.4" cy="6.6" r="1.1" />
    </svg>
  </a>

  <footer class="footer">© 2026 WEARSHIVER</footer>

  <script src="/CommingSoon/script.js"></script>
</body>
</html>
